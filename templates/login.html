{% extends "base.html" %}

{% block content %}
<!-- Container flex pour centrer la carte verticalement et horizontalement -->
<div class="min-h-[80vh] flex items-center justify-center">
  
  <!-- Carte principale avec un fond semi-transparent, un flou d'arrière-plan et une bordure -->
  <div class="max-w-md w-full space-y-8 p-10 bg-white/80 dark:bg-gray-800/80 backdrop-blur-lg rounded-2xl shadow-2xl border border-gray-200 dark:border-gray-700 transition-all duration-300 hover:shadow-3xl">
    
    <!-- En-tête du formulaire -->
    <div>
      <!-- Logo de l'application -->
<img class="mx-auto w-48 h-auto" src="{{ url_for('static', filename='img/trello_by_nbh_logo.png') }}" alt="NBH Logo">      <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900 dark:text-white">
        Connexion
      </h2>
      <p class="mt-2 text-center text-sm text-gray-600 dark:text-gray-400">
        Ou
        <a href="{{ url_for('auth.signup') }}" class="font-medium text-blue-600 hover:text-blue-500 dark:text-blue-400">
          créer un nouveau compte
        </a>
      </p>
    </div>

    <!-- Formulaire de connexion -->
    <form class="mt-8 space-y-6" method="POST">
      {{ form.hidden_tag() }}
      
      <div class="space-y-4 rounded-md shadow-sm">
        <div>
          <label for="mail" class="sr-only">Adresse email</label>
          <input id="mail" name="mail" type="email" autocomplete="email" required 
                 class="appearance-none rounded-lg relative block w-full px-3 py-2 border border-gray-300 dark:border-gray-600 placeholder-gray-500 dark:placeholder-gray-400 text-gray-900 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm transition duration-150 ease-in-out" 
                 placeholder="Adresse email">
        </div>
        <div>
          <label for="password" class="sr-only">Mot de passe</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required 
                 class="appearance-none rounded-lg relative block w-full px-3 py-2 border border-gray-300 dark:border-gray-600 placeholder-gray-500 dark:placeholder-gray-400 text-gray-900 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm transition duration-150 ease-in-out" 
                 placeholder="Mot de passe">
        </div>
      </div>

      <div>
        <button type="submit" 
                class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition duration-150 ease-in-out transform hover:scale-[1.02]">
          Se connecter
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
